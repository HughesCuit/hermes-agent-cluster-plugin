name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: py_compile __init__.py
        run: python -m py_compile __init__.py

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check __init__.py
